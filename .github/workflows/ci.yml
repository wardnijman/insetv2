name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-harness:
    # Draait de complete OFFLINE harnas op elke push/PR: compile -> contract-test
    # (semantische drift) -> generalisatie (compiler==oracle) -> capability-guard ->
    # runtime (pool+token-lifecycle) -> drift-probe (schoon). Geen live portaal-calls,
    # geen secrets: die vereisen creds + het gebonden IP en draaien apart (wekelijkse
    # live drift-probe, R1.2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Offline harnas (npm test)
        run: npm test

  widget-ui:
    # Widget-UI (geporte v1-componenten op de v2-seams): typecheck + build + SSR-smoke.
    # Eigen subpackage met eigen lockfile — de repo-root blijft dependency-vrij.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: widget-ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck (svelte-check)
        run: npm run check
      - name: Build
        run: npm run build
      - name: SSR-smoke (render-verificatie)
        run: npm run smoke
